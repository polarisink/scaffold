name: CI

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches:
      - main
      - master
      - "codex/**"
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    name: Verify Default Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Verify default build
        run: ./mvnw -B -ntp clean verify

  examples:
    name: Verify Examples Profile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Verify examples profile
        run: ./mvnw -B -ntp -Pexamples -Dmaven.test.skip=true verify

  examples-cloud:
    name: Verify Cloud Examples Profile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Verify cloud examples profile
        run: ./mvnw -B -ntp -Pexamples-cloud -Dmaven.test.skip=true verify

  frontend:
    name: Verify Naive UI Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: vue-vben-admin
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 11.7.0

      - name: Set up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22.18.0"
          cache: pnpm
          cache-dependency-path: vue-vben-admin/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck Naive UI app
        run: pnpm --filter @vben/web-naive typecheck

      - name: Build Naive UI app
        run: pnpm build:naive

  dependency-graph:
    name: Submit Dependency Graph
    needs:
      - build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Submit dependency graph
        uses: advanced-security/maven-dependency-submission-action@v5.0.0
