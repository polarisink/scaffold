services:
  nacos:
    image: nacos/nacos-server:${NACOS_VERSION:-v3.1.2-slim}
    container_name: scaffold-nacos
    restart: unless-stopped
    environment:
      MODE: standalone
      PREFER_HOST_MODE: hostname
      NACOS_AUTH_ENABLE: ${NACOS_AUTH_ENABLE:-false}
      NACOS_AUTH_IDENTITY_KEY: scaffold
      NACOS_AUTH_IDENTITY_VALUE: scaffold
      NACOS_AUTH_TOKEN: VGhpc0lzU2NhZmZvbGROYWNvc0F1dGhUb2tlbjEyMzQ1Njc4
      MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE: prometheus
    ports:
      - "${NACOS_CONSOLE_PORT:-8080}:8080"
      - "${NACOS_SERVER_PORT:-8848}:8848"
      - "${NACOS_GRPC_PORT:-9848}:9848"
    volumes:
      - nacos-logs:/home/nacos/logs
      - nacos-data:/home/nacos/data

  nacos-config-init:
    image: curlimages/curl:8.17.0
    restart: "no"
    depends_on:
      nacos:
        condition: service_started
    entrypoint: [ "/bin/sh", "/scripts/init-nacos-configs.sh" ]
    environment:
      NACOS_ADDR: http://nacos:8848
      NACOS_USERNAME: ${NACOS_USERNAME:-nacos}
      NACOS_PASSWORD: ${NACOS_PASSWORD:-nacos}
      NACOS_AUTH_ENABLE: ${NACOS_AUTH_ENABLE:-false}
    volumes:
      - ./scripts/init-nacos-configs.sh:/scripts/init-nacos-configs.sh:ro
      - ./seata/seataServer.properties:/configs/seataServer.properties:ro

  seata-server:
    image: apache/seata-server:2.5.0.jdk17
    container_name: scaffold-seata-server
    restart: unless-stopped
    depends_on:
      nacos-config-init:
        condition: service_completed_successfully
    environment:
      SEATA_IP: seata-server
      SEATA_PORT: 8091
    ports:
      - "${SEATA_PORT:-8091}:8091"
    volumes:
      - ./seata/application.yml:/seata-server/resources/application.yml:ro

  sentinel-dashboard:
    image: bladex/sentinel-dashboard:1.8.8
    container_name: scaffold-sentinel-dashboard
    restart: unless-stopped
    environment:
      JAVA_OPTS: >-
        -Dserver.port=8858
        -Dcsp.sentinel.dashboard.server=sentinel-dashboard:8858
    ports:
      - "${SENTINEL_PORT:-8858}:8858"
    healthcheck:
      test: [ "CMD-SHELL", "wget -q -O /dev/null http://localhost:8858/ || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s

  prometheus:
    image: prom/prometheus:v3.12.0
    container_name: scaffold-prometheus
    restart: unless-stopped
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:12.3.8
    container_name: scaffold-grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro

volumes:
  nacos-logs:
  nacos-data:
  prometheus-data:
  grafana-data:

networks:
  default:
    name: ${CLOUD_NETWORK:-scaffold-cloud}
    external: true
