x-nacos-environment: &nacos
  NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR:-host.docker.internal:8848}
  NACOS_USERNAME: ${NACOS_USERNAME:-nacos}
  NACOS_PASSWORD: ${NACOS_PASSWORD:-nacos}

services:
  cloud-provider:
    image: scaffold-test-cloud-provider:local
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MODULE: scaffold-test-provider-10081
    environment:
      <<: *nacos
      PROVIDER_DATASOURCE_URL: ${PROVIDER_DATASOURCE_URL}
      PROVIDER_DATASOURCE_USERNAME: ${BUSINESS_DATASOURCE_USERNAME:-root}
      PROVIDER_DATASOURCE_PASSWORD: ${BUSINESS_DATASOURCE_PASSWORD:-123456}
    expose:
      - "10081"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  cloud-consumer:
    image: scaffold-test-cloud-consumer:local
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MODULE: scaffold-test-consumer-10082
    environment:
      <<: *nacos
      CONSUMER_DATASOURCE_URL: ${CONSUMER_DATASOURCE_URL}
      CONSUMER_DATASOURCE_USERNAME: ${BUSINESS_DATASOURCE_USERNAME:-root}
      CONSUMER_DATASOURCE_PASSWORD: ${BUSINESS_DATASOURCE_PASSWORD:-123456}
    expose:
      - "10082"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  cloud-gateway:
    image: scaffold-test-cloud-gateway:local
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MODULE: scaffold-test-gateway-10000
    environment:
      <<: *nacos
      SENTINEL_DASHBOARD: ${SENTINEL_DASHBOARD:-host.docker.internal:8858}
    # 随机映射宿主机端口，使 Gateway 可横向扩容。
    ports:
      - "10000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  dubbo-provider:
    image: scaffold-test-dubbo-provider:local
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MODULE: scaffold-test-dubbo-provider-10881
    environment: *nacos
    expose:
      - "10881"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  dubbo-consumer:
    image: scaffold-test-dubbo-consumer:local
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MODULE: scaffold-test-dubbo-consumer-10092
    environment: *nacos
    expose:
      - "10092"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  cloud-order:
    image: scaffold-test-cloud-order:local
    build:
      context: ..
      dockerfile: docker/Dockerfile
      args:
        MODULE: scaffold-test-order-10083
    environment:
      <<: *nacos
      ORDER_DATASOURCE_URL: ${ORDER_DATASOURCE_URL}
      ORDER_DATASOURCE_USERNAME: ${BUSINESS_DATASOURCE_USERNAME:-root}
      ORDER_DATASOURCE_PASSWORD: ${BUSINESS_DATASOURCE_PASSWORD:-123456}
    expose:
      - "10083"
    extra_hosts:
      - "host.docker.internal:host-gateway"

networks:
  default:
    name: ${CLOUD_NETWORK:-scaffold-cloud}
    external: true
