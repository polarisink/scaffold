services:
  cloud-provider:
    image: scaffold-test-cloud-provider:local
    build:
      context: ..
      dockerfile: scaffold-test-cloud/Dockerfile
      args:
        MODULE: scaffold-test-provider-10081
    environment: &nacos
      NACOS_SERVER_ADDR: ${NACOS_SERVER_ADDR:-host.docker.internal:8848}
      NACOS_USERNAME: ${NACOS_USERNAME:-nacos}
      NACOS_PASSWORD: ${NACOS_PASSWORD:-nacos}
    expose:
      - "10081"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  cloud-consumer:
    image: scaffold-test-cloud-consumer:local
    build:
      context: ..
      dockerfile: scaffold-test-cloud/Dockerfile
      args:
        MODULE: scaffold-test-consumer-10082
    environment: *nacos
    expose:
      - "10082"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  cloud-gateway:
    image: scaffold-test-cloud-gateway:local
    build:
      context: ..
      dockerfile: scaffold-test-cloud/Dockerfile
      args:
        MODULE: scaffold-test-gateway-10000
    environment:
      <<: *nacos
      SENTINEL_DASHBOARD: ${SENTINEL_DASHBOARD:-host.docker.internal:8858}
    # Docker 为每个 Gateway 副本分配一个随机宿主机端口，因而该服务可横向扩容。
    ports:
      - "10000"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  dubbo-provider:
    image: scaffold-test-dubbo-provider:local
    build:
      context: ..
      dockerfile: scaffold-test-cloud/Dockerfile
      args:
        MODULE: scaffold-test-dubbo-provider-10881
    environment: *nacos
    expose:
      - "10881"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  dubbo-consumer:
    image: scaffold-test-dubbo-consumer:local
    build:
      context: ..
      dockerfile: scaffold-test-cloud/Dockerfile
      args:
        MODULE: scaffold-test-dubbo-consumer-10092
    environment: *nacos
    expose:
      - "10092"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  cloud-seata:
    image: scaffold-test-seata-client:local
    build:
      context: ..
      dockerfile: scaffold-test-cloud/Dockerfile
      args:
        MODULE: scaffold-test-seata-10093
    environment:
      <<: *nacos
      SEATA_NACOS_GROUP: ${SEATA_NACOS_GROUP:-SEATA_GROUP}
      SEATA_NACOS_DATA_ID: ${SEATA_NACOS_DATA_ID:-seataServer.properties}
      NACOS_NAMESPACE: ${NACOS_NAMESPACE:-}
    expose:
      - "10093"
    extra_hosts:
      - "host.docker.internal:host-gateway"
