spring:
  application:
    name: cloud-consumer-10082
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    username: ${CONSUMER_DATASOURCE_USERNAME:root}
    password: ${CONSUMER_DATASOURCE_PASSWORD:123456}
    url: ${CONSUMER_DATASOURCE_URL:jdbc:mysql://localhost:3306/scaffold_consumer?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${CONSUMER_JPA_DDL_AUTO:update}
    database-platform: org.hibernate.dialect.MySQLDialect
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:123456}
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:localhost:8858}
      eager: true

server:
  port: 10082

swagger:
  enabled: true
  title: 消费者服务接口文档
seata:
  application-id: ${spring.application.name}
  tx-service-group: scaffold-seata-tx-group
  service:
    vgroup-mapping:
      scaffold-seata-tx-group: default
  registry:
    type: nacos
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
      application: seata-server
      group: ${SEATA_NACOS_GROUP:SEATA_GROUP}
      namespace: ${NACOS_NAMESPACE:}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:123456}
  config:
    type: nacos
    nacos:
      server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
      group: ${SEATA_NACOS_GROUP:SEATA_GROUP}
      namespace: ${NACOS_NAMESPACE:}
      data-id: ${SEATA_NACOS_DATA_ID:seataServer.properties}
      username: ${NACOS_USERNAME:nacos}
      password: ${NACOS_PASSWORD:123456}


management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    propagation:
      type: w3c
    sampling:
      probability: 1.0
