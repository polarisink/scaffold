spring:
  application:
    name: dubbo-provider-10882

dubbo:
  application:
    name: ${spring.application.name}
  registry:
    address: nacos://${NACOS_SERVER_ADDR:localhost:8848}
    username: ${NACOS_USERNAME:nacos}
    password: ${NACOS_PASSWORD:nacos}
  protocol:
    name: dubbo
    port: 10881

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    propagation:
      type: w3c
    sampling:
      probability: 1.0
