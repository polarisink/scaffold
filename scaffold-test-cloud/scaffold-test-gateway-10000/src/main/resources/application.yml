spring:
  application:
    name: cloud-gateway-10000
  cloud:
    nacos:
      discovery:
        server-addr: ${NACOS_SERVER_ADDR:localhost:8848}
        username: ${NACOS_USERNAME:nacos}
        password: ${NACOS_PASSWORD:123456}
    sentinel:
      transport:
        dashboard: ${SENTINEL_DASHBOARD:localhost:8858}
      eager: true
    gateway:
      server:
        webflux:
          routes:
            - id: cloud-auth-10080
              uri: lb://cloud-auth-10080
              predicates:
                - Path=/auth/**
              filters:
                # Auth 业务路径保留 /auth，只将聚合文档路径改写为 /v3/api-docs。
                - RewritePath=/auth/(?<segment>v3/api-docs.*), /$\{segment}
            - id: cloud-provider-10081
              uri: lb://cloud-provider-10081
              predicates:
                - Path=/provider/**
              filters:
                - StripPrefix=1
            - id: cloud-consumer-10082
              uri: lb://cloud-consumer-10082
              predicates:
                - Path=/consumer/**
              filters:
                - StripPrefix=1
            - id: cloud-order-10083
              uri: lb://cloud-order-10083
              predicates:
                - Path=/order/**
              filters:
                - StripPrefix=1

server:
  port: 10000

scaffold:
  gateway:
    auth:
      enabled: ${GATEWAY_AUTH_ENABLED:true}
      auth-check-uri: lb://cloud-auth-10080/auth/token-info
      ignore-path-patterns:
        - /auth/login
        - /auth/v3/api-docs/**
        - /actuator/**
        - /favicon.ico
        - /error
        - /doc.html
        - /webjars/**
        - /v3/api-docs/**
        - /swagger-ui/**
        - /*/v3/api-docs/**

knife4j:
  gateway:
    # 生产环境可通过 KNIFE4J_GATEWAY_ENABLED=false 关闭聚合文档。
    enabled: ${KNIFE4J_GATEWAY_ENABLED:true}
    strategy: discover
    tags-sorter: order
    operations-sorter: order
    discover:
      enabled: true
      version: openapi3
      excluded-services:
        - cloud-gateway-.*
        - dubbo-.*
      service-config:
        cloud-auth-10080:
          group-name: 认证服务
          order: 1
        cloud-provider-10081:
          group-name: Provider 服务
          order: 2
        cloud-consumer-10082:
          group-name: Consumer 服务
          order: 3
        cloud-order-10083:
          group-name: Order 服务
          order: 4

management:
  endpoints:
    web:
      exposure:
        include: health,info,gateway,prometheus
  tracing:
    propagation:
      type: w3c
    sampling:
      probability: 1.0
