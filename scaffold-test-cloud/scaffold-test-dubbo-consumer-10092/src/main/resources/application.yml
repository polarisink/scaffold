spring:
  application:
    name: dubbo-consumer-10092

server:
  port: 10092

dubbo:
  application:
    name: dubbo-consumer
  registry:
    address: nacos://${NACOS_SERVER_ADDR:localhost:8848}
    username: ${NACOS_USERNAME:nacos}
    password: ${NACOS_PASSWORD:nacos}
  consumer:
    check: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  tracing:
    propagation:
      type: w3c
    sampling:
      probability: 1.0
logging:
  pattern:
    level: "%5p [traceId=%X{traceId:-}, spanId=%X{spanId:-}]"
