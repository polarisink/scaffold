<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SSE 业务推送控制台</title>
    <style>
        :root { color-scheme: dark; --bg:#09111f; --panel:#111c2e; --line:#263750; --text:#e9f0fa; --muted:#8fa3bd; --blue:#58a6ff; --green:#43d17b; --red:#ff6b6b; --amber:#ffca68; }
        * { box-sizing: border-box; }
        body { margin:0; min-height:100vh; background:radial-gradient(circle at 75% 0,#152b4b 0,transparent 35%),var(--bg); color:var(--text); font:14px/1.5 ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace; }
        .shell { width:min(1180px,calc(100% - 32px)); margin:auto; padding:32px 0; }
        header { display:flex; align-items:flex-end; justify-content:space-between; gap:20px; margin-bottom:24px; }
        h1 { margin:0; font:700 clamp(26px,4vw,42px)/1.1 system-ui,sans-serif; letter-spacing:-.04em; }
        header p { color:var(--muted); margin:8px 0 0; }
        .status { display:flex; align-items:center; gap:8px; color:var(--muted); white-space:nowrap; }
        .dot { width:9px; height:9px; border-radius:50%; background:var(--muted); box-shadow:0 0 0 4px #8fa3bd20; }
        .status.connected .dot { background:var(--green); box-shadow:0 0 0 4px #43d17b20; }
        .status.connecting .dot { background:var(--amber); box-shadow:0 0 0 4px #ffca6820; }
        .grid { display:grid; grid-template-columns:360px 1fr; gap:18px; }
        .stack { display:grid; gap:18px; align-content:start; }
        .card { background:#111c2ee8; border:1px solid var(--line); border-radius:16px; padding:18px; box-shadow:0 18px 50px #0004; }
        .card h2 { margin:0 0 16px; font:650 16px system-ui,sans-serif; }
        label { display:grid; gap:7px; margin:0 0 13px; color:var(--muted); font-size:12px; }
        input,textarea,select,button { font:inherit; }
        input,textarea,select { width:100%; border:1px solid var(--line); border-radius:9px; background:#0a1424; color:var(--text); padding:10px 11px; outline:none; }
        textarea { min-height:92px; resize:vertical; }
        input:focus,textarea:focus,select:focus { border-color:var(--blue); box-shadow:0 0 0 3px #58a6ff1b; }
        .actions { display:flex; gap:9px; flex-wrap:wrap; }
        button { border:0; border-radius:9px; padding:10px 14px; background:var(--blue); color:#06111f; font-weight:700; cursor:pointer; }
        button.secondary { background:#253750; color:var(--text); }
        button.danger { background:#40262d; color:#ff9a9a; }
        button:disabled { opacity:.45; cursor:not-allowed; }
        .stats { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
        .metric { padding:12px; border:1px solid var(--line); border-radius:10px; background:#0a1424; }
        .metric strong { display:block; font-size:22px; color:var(--green); }
        .metric span { color:var(--muted); font-size:11px; }
        .toolbar { display:flex; justify-content:space-between; align-items:center; gap:12px; margin-bottom:12px; }
        .toolbar h2 { margin:0; }
        .events { height:620px; overflow:auto; display:flex; flex-direction:column; gap:9px; padding-right:4px; }
        .empty { margin:auto; color:var(--muted); text-align:center; }
        .event { border:1px solid var(--line); border-left:3px solid var(--blue); border-radius:9px; padding:10px 12px; background:#0a1424; }
        .event.system { border-left-color:var(--muted); }
        .event.error { border-left-color:var(--red); }
        .event.sent { border-left-color:var(--green); }
        .event-head { display:flex; justify-content:space-between; gap:10px; color:var(--muted); font-size:11px; margin-bottom:5px; }
        .event-name { color:var(--blue); font-weight:700; }
        .event.sent .event-name { color:var(--green); }
        .event.error .event-name { color:var(--red); }
        pre { margin:0; white-space:pre-wrap; overflow-wrap:anywhere; color:#cdd9e8; font:12px/1.55 inherit; }
        .hint { color:var(--muted); font-size:11px; margin:10px 0 0; }
        @media (max-width:820px) { .grid { grid-template-columns:1fr; } header { align-items:flex-start; flex-direction:column; } .events { height:460px; } }
    </style>
</head>
<body>
<main class="shell">
    <header>
        <div><h1>SSE 推送控制台</h1><p>验证多用户连接、用户定向消息与房间广播</p></div>
        <div id="connectionStatus" class="status"><span class="dot"></span><span>未连接</span></div>
    </header>
    <div class="grid">
        <section class="stack">
            <div class="card">
                <h2>建立连接</h2>
                <label>用户 ID<input id="userId" value="user-1" autocomplete="off"></label>
                <label>房间 ID（逗号分隔）<input id="roomIds" value="room-a" placeholder="room-a, room-b" autocomplete="off"></label>
                <div class="actions">
                    <button id="connectButton" type="button">连接</button>
                    <button id="disconnectButton" class="danger" type="button" disabled>断开</button>
                </div>
                <p class="hint">生产环境的用户 ID 应从登录态获取，测试页仅为方便调试。</p>
            </div>
            <div class="card">
                <h2>发送测试消息</h2>
                <label>发送目标
                    <select id="targetType"><option value="user">指定用户</option><option value="room">指定房间</option></select>
                </label>
                <label>目标 ID<input id="targetId" value="user-1" autocomplete="off"></label>
                <label>事件名称<input id="eventName" value="notice" autocomplete="off"></label>
                <label>JSON 数据<textarea id="eventData">{"title":"订单已支付","orderId":"10001"}</textarea></label>
                <button id="sendButton" type="button">发送消息</button>
            </div>
            <div class="card">
                <h2>服务端在线状态</h2>
                <div class="stats">
                    <div class="metric"><strong id="onlineUsers">-</strong><span>在线用户</span></div>
                    <div class="metric"><strong id="onlineConnections">-</strong><span>在线连接</span></div>
                </div>
            </div>
        </section>
        <section class="card">
            <div class="toolbar"><h2>事件时间线</h2><button id="clearButton" class="secondary" type="button">清空</button></div>
            <div id="events" class="events"><div class="empty">连接后，收到的事件会显示在这里</div></div>
        </section>
    </div>
</main>
<script>
    const $ = id => document.getElementById(id);
    const state = { source: null, statsTimer: null, listenedEvents: new Set() };
    const knownEvents = ['connected', 'notice', 'chat', 'order-status', 'room-message'];

    function setStatus(type, text) {
        $('connectionStatus').className = `status ${type || ''}`;
        $('connectionStatus').lastElementChild.textContent = text;
        $('connectButton').disabled = type === 'connected' || type === 'connecting';
        $('disconnectButton').disabled = !state.source;
    }

    function parseData(data) {
        try { return JSON.parse(data); } catch { return data; }
    }

    function appendEvent(name, data, kind = '') {
        const container = $('events');
        container.querySelector('.empty')?.remove();
        const item = document.createElement('article');
        item.className = `event ${kind}`;
        const head = document.createElement('div');
        head.className = 'event-head';
        const eventName = document.createElement('span');
        eventName.className = 'event-name';
        eventName.textContent = name;
        const time = document.createElement('time');
        time.textContent = new Date().toLocaleTimeString();
        const body = document.createElement('pre');
        body.textContent = typeof data === 'string' ? data : JSON.stringify(data, null, 2);
        head.append(eventName, time);
        item.append(head, body);
        container.prepend(item);
    }

    function disconnect(log = true) {
        state.source?.close();
        state.source = null;
        state.listenedEvents.clear();
        setStatus('', '未连接');
        if (log) appendEvent('disconnected', '客户端主动关闭连接', 'system');
    }

    function listenEvent(name) {
        if (!state.source || !name || state.listenedEvents.has(name)) return;
        state.source.addEventListener(name, event => appendEvent(name, parseData(event.data)));
        state.listenedEvents.add(name);
    }

    function connect() {
        disconnect(false);
        const userId = $('userId').value.trim();
        if (!userId) return appendEvent('validation-error', '请输入用户 ID', 'error');
        const params = new URLSearchParams({ userId });
        $('roomIds').value.split(',').map(value => value.trim()).filter(Boolean)
            .forEach(roomId => params.append('roomId', roomId));
        setStatus('connecting', '连接中…');
        appendEvent('connecting', `/api/sse/connect?${params}`, 'system');

        const source = new EventSource(`/api/sse/connect?${params}`);
        state.source = source;
        source.onopen = () => { if (state.source === source) setStatus('connected', `已连接 · ${userId}`); };
        source.onmessage = event => appendEvent('message', parseData(event.data));
        [...knownEvents, $('eventName').value.trim()].forEach(listenEvent);
        source.onerror = () => {
            if (state.source !== source) return;
            setStatus('connecting', '连接中断，浏览器正在重连…');
            appendEvent('connection-error', '连接中断；EventSource 将按服务端 retry 策略自动重连', 'error');
        };
        localStorage.setItem('sse-test-user', userId);
        localStorage.setItem('sse-test-rooms', $('roomIds').value);
    }

    async function sendMessage() {
        const type = $('targetType').value;
        const targetId = $('targetId').value.trim();
        const event = $('eventName').value.trim();
        if (!targetId || !event) return appendEvent('validation-error', '目标 ID 和事件名称不能为空', 'error');
        listenEvent(event);
        let data;
        try { data = JSON.parse($('eventData').value); }
        catch (error) { return appendEvent('json-error', `消息数据不是有效 JSON：${error.message}`, 'error'); }
        const path = type === 'user' ? `users/${encodeURIComponent(targetId)}` : `rooms/${encodeURIComponent(targetId)}`;
        $('sendButton').disabled = true;
        try {
            const response = await fetch(`/api/sse/${path}/messages`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ event, data })
            });
            if (!response.ok) throw new Error(`${response.status} ${await response.text()}`);
            const result = await response.json();
            appendEvent('message-enqueued', {
                targetType: type, targetId, event,
                messageId: result.messageId,
                accepted: result.accepted,
                enqueuedConnections: result.enqueuedConnections
            }, 'sent');
            refreshStats();
        } catch (error) { appendEvent('send-error', error.message, 'error'); }
        finally { $('sendButton').disabled = false; }
    }

    async function refreshStats() {
        try {
            const response = await fetch('/api/sse/stats', { cache: 'no-store' });
            if (!response.ok) throw new Error();
            const stats = await response.json();
            $('onlineUsers').textContent = stats.users;
            $('onlineConnections').textContent = stats.connections;
        } catch { $('onlineUsers').textContent = $('onlineConnections').textContent = '-'; }
    }

    $('connectButton').addEventListener('click', connect);
    $('disconnectButton').addEventListener('click', () => disconnect(true));
    $('sendButton').addEventListener('click', sendMessage);
    $('clearButton').addEventListener('click', () => { $('events').innerHTML = '<div class="empty">事件记录已清空</div>'; });
    $('targetType').addEventListener('change', event => {
        $('targetId').value = event.target.value === 'user' ? $('userId').value.trim() : ($('roomIds').value.split(',')[0]?.trim() || '');
        $('eventName').value = event.target.value === 'user' ? 'notice' : 'chat';
    });
    $('userId').addEventListener('change', () => { if ($('targetType').value === 'user') $('targetId').value = $('userId').value.trim(); });
    window.addEventListener('beforeunload', () => state.source?.close());

    $('userId').value = localStorage.getItem('sse-test-user') || 'user-1';
    $('roomIds').value = localStorage.getItem('sse-test-rooms') || 'room-a';
    $('targetId').value = $('userId').value;
    refreshStats();
    state.statsTimer = setInterval(refreshStats, 5000);
</script>
</body>
</html>
