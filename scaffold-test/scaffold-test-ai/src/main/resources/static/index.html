<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Scaffold AI Lab</title>
    <style>
        :root {
            --ink: #17202a;
            --muted: #68747f;
            --paper: #f4f0e8;
            --card: #fffdf7;
            --line: #d8d1c3;
            --orange: #e96b3a;
            --green: #167d6b;
            --shadow: 0 18px 55px #34271918
        }

        * {
            box-sizing: border-box
        }

        body {
            margin: 0;
            min-height: 100vh;
            color: var(--ink);
            background: radial-gradient(circle at 8% 8%, #f6cfae 0, transparent 25%), radial-gradient(circle at 90% 85%, #b9d9cf 0, transparent 30%), var(--paper);
            font: 15px/1.6 Inter, ui-sans-serif, system-ui, sans-serif
        }

        .shell {
            width: min(1120px, calc(100% - 32px));
            margin: auto;
            padding: 44px 0
        }

        header {
            margin-bottom: 24px
        }

        .eyebrow {
            color: var(--orange);
            font-weight: 800;
            letter-spacing: .16em;
            text-transform: uppercase;
            font-size: 12px
        }

        h1 {
            font: 800 clamp(32px, 6vw, 62px)/.95 Georgia, serif;
            margin: 5px 0 10px;
            letter-spacing: -.045em
        }

        header p {
            margin: 0;
            color: var(--muted)
        }

        .grid {
            display: grid;
            grid-template-columns:1.55fr .85fr;
            gap: 18px
        }

        .card {
            background: var(--card);
            border: 1px solid var(--line);
            border-radius: 18px;
            box-shadow: var(--shadow);
            overflow: hidden
        }

        .card-head {
            padding: 16px 18px;
            border-bottom: 1px solid var(--line);
            display: flex;
            justify-content: space-between;
            align-items: center
        }

        .card h2 {
            font-size: 16px;
            margin: 0
        }

        .chat {
            height: 470px;
            padding: 20px;
            overflow: auto;
            display: flex;
            flex-direction: column;
            gap: 12px
        }

        .message {
            max-width: 84%;
            padding: 11px 14px;
            border-radius: 14px;
            background: #ede8dc;
            white-space: pre-wrap
        }

        .message.user {
            align-self: flex-end;
            background: var(--ink);
            color: white
        }

        .message.ai {
            align-self: flex-start;
            border-bottom-left-radius: 3px
        }

        .message.error {
            color: #a42d24;
            background: #f9ddd5
        }

        .composer {
            border-top: 1px solid var(--line);
            padding: 14px;
            display: grid;
            grid-template-columns:1fr auto;
            gap: 10px
        }

        textarea, input, button {
            font: inherit
        }

        textarea, input {
            border: 1px solid var(--line);
            border-radius: 11px;
            background: white;
            padding: 11px 12px;
            color: var(--ink);
            outline: none
        }

        textarea {
            resize: none;
            min-height: 54px
        }

        textarea:focus, input:focus {
            border-color: var(--green);
            box-shadow: 0 0 0 3px #167d6b18
        }

        button {
            border: 0;
            border-radius: 11px;
            padding: 10px 15px;
            background: var(--orange);
            color: white;
            font-weight: 750;
            cursor: pointer
        }

        button.secondary {
            background: var(--green)
        }

        button:disabled {
            opacity: .5
        }

        .tools {
            padding: 16px;
            display: grid;
            gap: 12px
        }

        .tool {
            border: 1px solid var(--line);
            border-radius: 13px;
            padding: 13px
        }

        .tool strong {
            display: block
        }

        .tool small {
            color: var(--muted)
        }

        .tool-form {
            display: flex;
            gap: 8px;
            margin-top: 10px
        }

        .tool-form input {
            min-width: 0;
            flex: 1
        }

        .output {
            margin-top: 9px;
            color: var(--green);
            font: 12px/1.45 ui-monospace, monospace;
            overflow-wrap: anywhere
        }

        .empty {
            color: var(--muted);
            text-align: center;
            margin: auto
        }

        @media (max-width: 800px) {
            .grid {
                grid-template-columns:1fr
            }

            .chat {
                height: 400px
            }
        }
    </style>
</head>
<body>
<main class="shell">
    <header>
        <div class="eyebrow">Spring AI playground</div>
        <h1>Scaffold AI Lab</h1>
        <p>流式聊天、会话记忆与 Tool Calling 的最小测试台</p></header>
    <div class="grid">
        <section class="card">
            <div class="card-head"><h2>AI 对话</h2>
                <button id="clear" class="secondary">新会话</button>
            </div>
            <div id="chat" class="chat">
                <div class="message ai">你好，我是 Scaffold AI Starter 演示助手。发送一条消息试试。</div>
            </div>
            <form id="form" class="composer"><textarea id="message"
                                                       placeholder="输入消息，Enter 发送，Shift + Enter 换行"></textarea>
                <button id="send">发送</button>
            </form>
        </section>
        <aside class="card">
            <div class="card-head"><h2>已注册工具</h2><span id="count">加载中</span></div>
            <div id="tools" class="tools"></div>
        </aside>
    </div>
</main>
<script>
    const $ = id => document.getElementById(id);
    let conversationId = crypto.randomUUID();

    function bubble(text, type = 'ai') {
        const el = document.createElement('div');
        el.className = `message ${type}`;
        el.textContent = text;
        $('chat').append(el);
        $('chat').scrollTop = $('chat').scrollHeight;
        return el
    }

    function unwrap(payload) {
        if (payload && typeof payload === 'object' && Object.hasOwn(payload, 'data')) {
            if (payload.code !== 0) throw new Error(payload.message || `请求失败（${payload.code}）`);
            return payload.data
        }
        return payload
    }

    function appendSseBlock(block, answer) {
        for (const line of block.split(/\r?\n/)) {
            if (!line.startsWith('data:')) continue;
            const data = line.slice(5).trimStart();
            if (data && data !== '[DONE]') answer.textContent += data
        }
    }

    async function send(event) {
        event.preventDefault();
        const message = $('message').value.trim();
        if (!message) return;
        bubble(message, 'user');
        $('message').value = '';
        $('send').disabled = true;
        const answer = bubble('', 'ai');
        try {
            const response = await fetch('/api/ai/chat/stream', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({conversationId, message})
            });
            if (!response.ok) throw new Error(await response.text());
            const reader = response.body.getReader(), decoder = new TextDecoder();
            let buffer = '';
            while (true) {
                const {done, value} = await reader.read();
                buffer += decoder.decode(value || new Uint8Array(), {stream: !done});
                const parts = buffer.split(/\r?\n\r?\n/);
                buffer = parts.pop() || '';
                parts.forEach(part => appendSseBlock(part, answer));
                if (done) break
            }
            if (buffer) appendSseBlock(buffer, answer);
            if (!answer.textContent) throw new Error('模型未返回内容，请检查服务端日志与模型配置')
        } catch (error) {
            answer.className = 'message error';
            answer.textContent = '请求失败：' + error.message
        } finally {
            $('send').disabled = false;
            $('message').focus()
        }
    }

    async function loadTools() {
        try {
            const response = await fetch('/api/ai/tools');
            const payload = await response.json();
            if (!response.ok) throw new Error(payload.message || response.status);
            const tools = unwrap(payload);
            if (!Array.isArray(tools)) throw new Error('工具接口返回格式不正确');
            $('count').textContent = `${tools.length} 个`;
            $('tools').innerHTML = tools.length ? '' : '<div class="empty">暂无已注册工具</div>';
            tools.forEach(tool => {
                const el = document.createElement('article');
                el.className = 'tool';
                el.innerHTML = `<strong>${tool.name}</strong><small>${tool.description || '无描述'}</small><div class="tool-form"><input placeholder='JSON 参数，如 {"left":1,"right":2}'><button>调用</button></div><div class="output"></div>`;
                el.querySelector('button').onclick = async () => {
                    const input = el.querySelector('input'), out = el.querySelector('.output');
                    try {
                        const body = input.value.trim() ? JSON.parse(input.value) : {};
                        const response = await fetch(`/api/ai/tools/${encodeURIComponent(tool.name)}/invoke`, {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify(body)
                        });
                        const payload = await response.json();
                        if (!response.ok) throw new Error(payload.message || response.status);
                        const data = unwrap(payload);
                        out.textContent = data.result
                    } catch (error) {
                        out.textContent = '错误：' + error.message
                    }
                };
                $('tools').append(el)
            })
        } catch (error) {
            $('count').textContent = '加载失败';
            $('tools').innerHTML = '';
            const message = document.createElement('div');
            message.className = 'message error';
            message.textContent = '工具加载失败：' + error.message;
            $('tools').append(message)
        }
    }

    $('form').addEventListener('submit', send);
    $('message').addEventListener('keydown', e => {
        if (e.key === 'Enter' && !e.shiftKey) {
            e.preventDefault();
            $('form').requestSubmit()
        }
    });
    $('clear').onclick = () => {
        conversationId = crypto.randomUUID();
        $('chat').innerHTML = '';
        bubble('已创建新会话。')
    };
    loadTools();
</script>
</body>
</html>
