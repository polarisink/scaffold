spring:
  application:
    name: scaffold-test-ai
  profiles:
    default: ollama
  datasource:
    url: ${SCAFFOLD_DB_URL:jdbc:postgresql://localhost:5432/scaffold_ai}
    username: aries
    password: 123456
    driver-class-name: org.postgresql.Driver
  data:
    redis:
      host: localhost
      port: 6379
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  flyway:
    baseline-on-migrate: true
    baseline-version: 0
    locations: classpath:db/migration/{vendor}
  sql:
    init:
      mode: never
  ai:
    model:
      embedding: transformers
    embedding:
      transformer:
        onnx:
          model-uri: https://huggingface.co/Xenova/bge-small-zh-v1.5/resolve/main/onnx/model_quantized.onnx
        tokenizer:
          uri: https://huggingface.co/Xenova/bge-small-zh-v1.5/resolve/main/tokenizer.json
          options:
            padding: true
        cache:
          directory: ${user.home}/.cache/scaffold-ai/onnx
    vectorstore:
      pgvector:
        initialize-schema: false
        schema-validation: true
        id-type: text
        table-name: ai_knowledge_vector
        dimensions: 512
        index-type: HNSW
        distance-type: COSINE_DISTANCE
server:
  port: 8101
scaffold:
  swagger:
    enabled: true
    title: Scaffold AI Support API
    description: AI 智能售后工单学习系统接口
    version: v1.0
    group-name: ai-support
    base-package: com.scaffold
    base-path:
      - /api/**
    exclude-path:
      - /error
  ai:
    system-prompt: 你是 Scaffold AI Starter 的演示助手。
    memory-max-messages: 20
    advisor-logging-enabled: false
    refund:
      confirmation-ttl: 10m
    security:
      enabled: false
  security:
    token:
      jwt-secret: ${SCAFFOLD_JWT_SECRET:scaffold-ai-support-local-secret-32-bytes}
      cache-ttl: 30m
      cache-maximum-size: 10000
    cors:
      enabled: true
      allowed-origin-patterns:
        - "http://localhost:*"
        - "http://127.0.0.1:*"
      allowed-methods:
        - GET
        - POST
        - PUT
        - DELETE
        - PATCH
        - OPTIONS
      allowed-headers:
        - "*"
