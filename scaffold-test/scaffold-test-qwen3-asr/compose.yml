# 公共配置通过 YAML 锚点复用，CPU/GPU profile 只覆盖设备相关参数。
x-qwen3-asr-common: &qwen3-asr-common
  ports:
    - "${QWEN3_ASR_HOST_PORT:-8093}:8093"
  environment: &qwen3-asr-environment
    QWEN3_ASR_MODEL_PATH: /models/${QWEN3_ASR_MODEL_NAME:-Qwen3-ASR-0.6B}
    QWEN3_ASR_MAX_BATCH_SIZE: ${QWEN3_ASR_MAX_BATCH_SIZE:-8}
    QWEN3_ASR_MAX_NEW_TOKENS: ${QWEN3_ASR_MAX_NEW_TOKENS:-512}
    QWEN3_ASR_TIMEOUT_SECONDS: ${QWEN3_ASR_TIMEOUT_SECONDS:-900}
  volumes:
    - type: bind
      source: ${QWEN3_ASR_MODEL_SOURCE:-./models/Qwen3-ASR-0.6B}
      target: /models/${QWEN3_ASR_MODEL_NAME:-Qwen3-ASR-0.6B}
      read_only: true
  shm_size: 4gb
  restart: unless-stopped

services:
  qwen3-asr-cpu:
    <<: *qwen3-asr-common
    profiles: [cpu]
    image: scaffold-qwen3-asr:cpu
    build:
      context: ../..
      dockerfile: scaffold-test/scaffold-test-qwen3-asr/Dockerfile
      target: cpu
      additional_contexts:
        model-context: ${QWEN3_ASR_MODEL_SOURCE:-./models/Qwen3-ASR-0.6B}
      args:
        EMBED_MODEL: ${QWEN3_ASR_EMBED_MODEL:-false}
        MODEL_NAME: ${QWEN3_ASR_MODEL_NAME:-Qwen3-ASR-0.6B}
    environment:
      <<: *qwen3-asr-environment
      QWEN3_ASR_DEVICE_MAP: cpu
      QWEN3_ASR_DTYPE: float32

  qwen3-asr-gpu:
    <<: *qwen3-asr-common
    profiles: [gpu]
    image: scaffold-qwen3-asr:gpu
    build:
      context: ../..
      dockerfile: scaffold-test/scaffold-test-qwen3-asr/Dockerfile
      target: gpu
      additional_contexts:
        model-context: ${QWEN3_ASR_MODEL_SOURCE:-./models/Qwen3-ASR-0.6B}
      args:
        EMBED_MODEL: ${QWEN3_ASR_EMBED_MODEL:-false}
        MODEL_NAME: ${QWEN3_ASR_MODEL_NAME:-Qwen3-ASR-0.6B}
    environment:
      <<: *qwen3-asr-environment
      QWEN3_ASR_DEVICE_MAP: cuda:0
      QWEN3_ASR_DTYPE: float16
    gpus: all
