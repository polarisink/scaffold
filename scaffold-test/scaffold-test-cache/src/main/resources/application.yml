server:
  port: 8096

spring:
  application:
    name: scaffold-test-postgresql-cache
  datasource:
    url: jdbc:postgresql://localhost:5432/aries
    username: aries
    password: 123456
    driver-class-name: org.postgresql.Driver

scaffold:
  cache:
    mode: single
    type: postgresql
    postgresql:
      datasource:
        url: jdbc:postgresql://localhost:5432/aries
        username: aries
        password: 123456
        driver-class-name: org.postgresql.Driver
      table-name: scaffold_spring_cache
      default-ttl: 3d
      initialize-schema: true
      cleanup-on-startup: true
      scheduled-cleanup: true
      cleanup-interval: 5m
